name: Deploy Content to demo [5725ff92-691f-4a10-94cc-e2405d88c652]
# Note: This workflow will deploy everything in the root directory.
# To deploy content only from a specific path (for example SentinelContent):
#   1. Add the target path to the "paths" property like such
#    paths:
#    - 'SentinelContent/**'
#    - '!.github/workflows/**'
#    - '.github/workflows/sentinel-deploy-5725ff92-691f-4a10-94cc-e2405d88c652.yml'
#   2. Append the path to the directory environment variable below
#       directory: '${{ github.workspace }}/SentinelContent'

on:
  push:
    branches: [ test-cd ]
    paths:
    - '**'
    - '!.github/workflows/**'  # this filter prevents other workflow changes from triggering this workflow
    - '.github/workflows/sentinel-deploy-5725ff92-691f-4a10-94cc-e2405d88c652.yml'

jobs:
  deploy-content:
    runs-on: windows-latest
    env:
      resourceGroupName: 'licenseresourcegroup'
      workspaceName: 'demo'
      workspaceId: 'a79f3d72-5eab-4745-9903-00bcad4fc6b7'
      directory: '${{ github.workspace }}'
      cloudEnv: 'AzureCloud'
      contentTypes: 'Workbook'
      branch: 'test-cd'
      sourceControlId: '5725ff92-691f-4a10-94cc-e2405d88c652'
      rootDirectory: '${{ github.workspace }}'
      githubAuthToken: ${{ secrets.GITHUB_TOKEN }}
      smartDeployment: 'true'
    permissions:
      contents: write
      id-token: write # Require write permission to Fetch an OIDC token.

    steps:
    - name: Login to Azure (Attempt 1)
      continue-on-error: true
      id: login1
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_5725ff92691f4a1094cce2405d88c652 }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_5725ff92691f4a1094cce2405d88c652 }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_5725ff92691f4a1094cce2405d88c652 }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 1 failed
      if: ${{ steps.login1.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 2)
      continue-on-error: true
      id: login2
      uses: azure/login@v2
      if: ${{ steps.login1.outcome=='failure' }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_5725ff92691f4a1094cce2405d88c652 }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_5725ff92691f4a1094cce2405d88c652 }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_5725ff92691f4a1094cce2405d88c652 }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 2 failed
      if: ${{ steps.login2.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 3)
      continue-on-error: false
      id: login3
      uses: azure/login@v2
      if: ${{ steps.login2.outcome=='failure'  }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_5725ff92691f4a1094cce2405d88c652 }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_5725ff92691f4a1094cce2405d88c652 }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_5725ff92691f4a1094cce2405d88c652 }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Checkout
      uses: actions/checkout@v3

    - name: Deploy Content to Microsoft Sentinel
      uses: azure/powershell@v2
      with:
        azPSVersion: 'latest'
        inlineScript: |
          ${{ github.workspace }}//.github/workflows/azure-sentinel-deploy-5725ff92-691f-4a10-94cc-e2405d88c652.ps1