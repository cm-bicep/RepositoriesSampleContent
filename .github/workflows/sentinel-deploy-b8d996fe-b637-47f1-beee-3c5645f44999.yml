name: Deploy Content to sentinel-workspace-gdap-testing3 [b8d996fe-b637-47f1-beee-3c5645f44999]
# Note: This workflow will deploy everything in the root directory.
# To deploy content only from a specific path (for example SentinelContent):
#   1. Add the target path to the "paths" property like such
#    paths:
#    - 'SentinelContent/**'
#    - '!.github/workflows/**'
#    - '.github/workflows/sentinel-deploy-b8d996fe-b637-47f1-beee-3c5645f44999.yml'
#   2. Append the path to the directory environment variable below
#       directory: '${{ github.workspace }}/SentinelContent'

on:
  push:
    branches: [ test-cd ]
    paths:
    - '**'
    - '!.github/workflows/**'  # this filter prevents other workflow changes from triggering this workflow
    - '.github/workflows/sentinel-deploy-b8d996fe-b637-47f1-beee-3c5645f44999.yml'

jobs:
  deploy-content:
    runs-on: windows-latest
    env:
      resourceGroupName: 'sentinel-rg-gdap-testing3'
      workspaceName: 'sentinel-workspace-gdap-testing3'
      workspaceId: '4f4811a0-55fd-4c97-8d27-236aae58cae5'
      directory: '${{ github.workspace }}'
      cloudEnv: 'AzureCloud'
      contentTypes: 'CustomDetection'
      branch: 'test-cd'
      sourceControlId: 'b8d996fe-b637-47f1-beee-3c5645f44999'
      rootDirectory: '${{ github.workspace }}'
      githubAuthToken: ${{ secrets.GITHUB_TOKEN }}
      smartDeployment: 'true'
    permissions:
      contents: write
      id-token: write # Require write permission to Fetch an OIDC token.

    steps:
    - name: Login to Azure (Attempt 1)
      continue-on-error: true
      id: login1
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_b8d996feb63747f1beee3c5645f44999 }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_b8d996feb63747f1beee3c5645f44999 }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_b8d996feb63747f1beee3c5645f44999 }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 1 failed
      if: ${{ steps.login1.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 2)
      continue-on-error: true
      id: login2
      uses: azure/login@v2
      if: ${{ steps.login1.outcome=='failure' }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_b8d996feb63747f1beee3c5645f44999 }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_b8d996feb63747f1beee3c5645f44999 }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_b8d996feb63747f1beee3c5645f44999 }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 2 failed
      if: ${{ steps.login2.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 3)
      continue-on-error: false
      id: login3
      uses: azure/login@v2
      if: ${{ steps.login2.outcome=='failure'  }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_b8d996feb63747f1beee3c5645f44999 }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_b8d996feb63747f1beee3c5645f44999 }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_b8d996feb63747f1beee3c5645f44999 }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Checkout
      uses: actions/checkout@v3

    - name: Deploy Content to Microsoft Sentinel
      uses: azure/powershell@v2
      with:
        azPSVersion: 'latest'
        inlineScript: |
          ${{ github.workspace }}//.github/workflows/azure-sentinel-deploy-b8d996fe-b637-47f1-beee-3c5645f44999.ps1